<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Company Registration</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="container">
    <h1>Register Your Company</h1>
    <form th:action="@{/register}" th:object="${company}" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label>Company Name:</label>
            <input type="text" th:field="*{name}">
            <p class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" th:field="*{email}">
            <p class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" th:field="*{password}">
            <p class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        </div>
        <div class="form-group">
            <label>Company Logo:</label>
            <input type="file" name="logo">
        </div>
        <button type="submit">Register</button>
    </form>
    <p th:if="${error}" class="error" th:text="${error}"></p>
    <br>
    <a th:href="@{/}">Back to Home</a>
</div>
</body>
</html>
