<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Post Job Listing</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="container">
    <h1>Post a New Job</h1>
    <form th:action="@{/post-job}" th:object="${job}" method="post">
        <div class="form-group">
            <label>Job Title:</label>
            <input type="text" th:field="*{title}">
            <p class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
        </div>
        <div class="form-group">
            <label>Description:</label>
            <textarea th:field="*{description}"></textarea>
            <p class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
        </div>
        <div class="form-group">
            <label>Salary:</label>
            <input type="number" step="0.01" th:field="*{salary}">
            <p class="error" th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></p>
        </div>
        <div class="form-group">
            <label>Experience:</label>
            <input type="text" th:field="*{experience}">
            <p class="error" th:if="${#fields.hasErrors('experience')}" th:errors="*{experience}"></p>
        </div>
        <div class="form-group">
            <label>Company:</label>
            <select th:field="*{company}">
                <option th:each="comp : ${companies}" th:value="${comp.id}" th:text="${comp.name}"></option>
            </select>
        </div>
        <button type="submit">Post Job</button>
    </form>
    <br>
    <a th:href="@{/}">Back to Home</a>
</div>
</body>
</html>
