<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(title=#{home.title})}"></head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container">
    <h1 class="page-title" th:text="#{home.welcome}">Welcome</h1>

    <div th:if="${param.success}" class="alert alert-success">
        <p th:if="${param.success[0] == 'registered'}" th:text="#{home.success.registered}">Company registered successfully!</p>
        <p th:if="${param.success[0] == 'posted'}" th:text="#{home.success.posted}">Job posted successfully!</p>
    </div>

    <h2 class="section-title" th:text="#{home.latestJobs}">Latest Job Listings</h2>
    <div class="job-grid">
        <div th:each="job : ${jobs}" class="job-card">
            <h3 class="job-title" th:text="${job.title}">Job Title</h3>
            <p class="job-company" th:text="${job.company.name}">Company</p>
            <p class="job-desc" th:text="${job.description}">Description</p>
            
            <div class="job-meta">
                <div class="job-meta-item">
                    <span class="job-meta-label" th:text="#{job.salary}">Salary</span>
                    <span class="job-meta-value" th:text="${job.salary}">0</span>
                </div>
                <div class="job-meta-item" style="text-align: right;">
                    <span class="job-meta-label" th:text="#{job.experience}">Experience</span>
                    <span class="job-meta-value" th:text="${job.experience}">None</span>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
